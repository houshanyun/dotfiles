# ==============================================================================
# Alacritty Configuration - Solarized Osaka Theme
# ==============================================================================

# [窗口設定]
[window]
padding = { x = 30, y = 10 }
dynamic_padding = true                                    # 保持動態邊距開啟，這樣當你調整視窗大小時，留白會按比例縮放
opacity = 0.95                                            # 輕微透明度，增加現代感
blur = true                                               # 在支援的環境下開啟背景模糊
title = "Alacritty"
class = { instance = "Alacritty", general = "Alacritty" }
decorations = "none"
dimensions = { columns = 120, lines = 30 }

# [字體設定]
[font]
normal = { family = "FiraCode Nerd Font Mono", style = "Medium" }
bold = { family = "FiraCode Nerd Font Mono", style = "Bold" }
italic = { family = "FiraCode Nerd Font Mono", style = "Italic" }
size = 16.0

# [光標設定]
[cursor]
#style = { shape = "Beam", blinking = "On" }
vi_mode_style = { shape = "Block" }
style = { shape = "Block", blinking = "On" } # 在空白畫面中易於定位

# [捲動設定]
[scrolling]
history = 10000
multiplier = 3

# [色彩配置] - Solarized Osaka Style
[colors.primary]
background = "#1a1b26"
foreground = "#a9b1d6"

[colors.cursor]
text = "#1a1b26"
#cursor = "#c0caf5"
cursor = "#73daca" # 亮綠色游標

[colors.selection]
text = "CellForeground"
background = "#283457"

[colors.normal]
black = "#414868"
red = "#f7768e"
green = "#73daca"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#c0caf5"

[colors.bright]
black = "#414868"
red = "#f7768e"
green = "#73daca"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#c0caf5"

[colors]
draw_bold_text_with_bright_colors = true

# [終端環境設定]
[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

# [滑鼠設定]
[mouse]
hide_when_typing = true

# [快捷鍵設定]
[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[selection]
save_to_clipboard = true

# 全螢幕
[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"

# 最小化
[[keyboard.bindings]]
key = "M"
mods = "Control|Shift"
action = "Minimize"

# 關閉
[[keyboard.bindings]]
key = "Q"
mods = "Control|Shift"
action = "Quit"

[terminal.shell]
program = "wsl"
args = ["-d", "archlinux", "--cd", "~", "tmux -f ~/.config/tmux/tmux.conf"]

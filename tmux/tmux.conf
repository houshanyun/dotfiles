# ================================================================
# 🎨 SOLARIZED 配色定義 (常量區)
# ================================================================

# --- 基礎色調 (Base Tones) ---
SOLAR_BASE03="#002b36"  # 背景 (深)
SOLAR_BASE02="#073642"  # 背景亮部 (深)
SOLAR_BASE01="#586e75"  # 內容/次要文字
SOLAR_BASE00="#657b83"  # 內容/主要文字
SOLAR_BASE0="#839496"   # 內容/主要文字
SOLAR_BASE1="#93a1a1"   # 內容/次要文字
SOLAR_BASE2="#eee8d5"   # 背景亮部 (淺)
SOLAR_BASE3="#fdf6e3"   # 背景 (淺)

# --- 功能色 (Accents) ---
SOLAR_YELLOW="#b58900"
SOLAR_ORANGE="#cb4b16"
SOLAR_RED="#dc322f"
SOLAR_MAGENTA="#d33682"
SOLAR_VIOLET="#6c71c4"
SOLAR_BLUE="#268bd2"
SOLAR_CYAN="#2aa198"
SOLAR_GREEN="#859900"

# ================================================================
# 🚀 核心功能與快捷鍵 (保留你的偏好)
# ================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g base-index 1
set -g pane-base-index 1
set -sg escape-time 1
set -g history-limit 10000
set -g renumber-windows on
set -g repeat-time 1000

# ================================================================
# 🌊 Solarized Osaka - 深度沉浸版
# ================================================================

# 狀態列基礎 - 使用 Osaka 深色背景
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=${SOLAR_BASE03},fg=${SOLAR_ORANGE}"

# ----------------------------------------------------------------
# 🛰️ 左側資訊：使用主題標誌性的橙黃與深靛藍
# ----------------------------------------------------------------
set -g status-left-length 100
set -g status-left "#[fg=${SOLAR_VIOLET},bg=${SOLAR_BASE03},bold]  #S | "

# ----------------------------------------------------------------
# 🛸 右側資訊：對應 Solarized Osaka 的色彩階梯 (藍/青/紫)
# ---------------------------------------------------------------
set -g status-right ""

# ----------------------------------------------------------------
# 🌌 視窗分頁與邊框 (優化細節)
# ----------------------------------------------------------------
# 未選中的視窗 - 較暗的藍灰色
setw -g window-status-style "fg=${SOLAR_BASE00},bg=${SOLAR_BASE03}"
setw -g window-status-format "#[fg=${SOLAR_BASE00},bg=${SOLAR_BASE03}, bold]"

# 選中的視窗 - 使用 Osaka 高亮青色 (Cyan)
setw -g window-status-current-style "fg=${SOLAR_MAGENTA},bg=${SOLAR_BASE03},bold"
setw -g window-status-current-format "#[fg=${SOLAR_MAGENTA},bg=${SOLAR_BASE03},bold]"
#setw -g window-status-current-format"#{?window_zoomed_flag,fg=${SOLAR_ORANGE},fg=${SOLAR_MAGENTA}},bold  "
# 面板與訊息
set -g pane-border-style "fg=#24283b"
set -g pane-border-lines simple
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#e0af68,fg=#101419,bold" # 警告訊息使用金黃色
setw -g mode-style "bg=#364a82,fg=#c0caf5,bold"  # 選取模式 (Copy Mode) 的配色

unbind %
unbind '"' 
unbind r
unbind v
bind v copy-mode 
bind r source-file ~/dotfiles/tmux/tmux.conf
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z


set-window-option -g mode-key vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
